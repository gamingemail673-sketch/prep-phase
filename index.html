function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function decryptHtml(password) {
  const salt = b64ToBytes(PAYLOAD.salt);
  const iv   = b64ToBytes(PAYLOAD.iv);
  const ct   = b64ToBytes(PAYLOAD.ct);
  const enc  = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password),
    { name: "PBKDF2" }, false, ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: PAYLOAD.iter, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
  // AES-GCM auth tag will throw if the password is wrong.
  const plain = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv }, key, ct
  );
  return new TextDecoder().decode(plain);
}

function setErr(msg) { document.getElementById("err").textContent = msg; }

document.getElementById("unlock-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("go");
  const pwd = document.getElementById("pwd");
  setErr("");
  btn.disabled = true;
  btn.textContent = "Unlocking…";
  try {
    const html = await decryptHtml(pwd.value);
    // Replace the public stub with the decrypted real document. Scripts
    // in the new payload (data injection + JS bundle) run after
    // document.close() per the HTML spec.
    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    setErr("Wrong password.");
    btn.disabled = false;
    btn.textContent = "Unlock";
    pwd.value = "";
    pwd.focus();
  }
});

if (!window.crypto || !window.crypto.subtle) {
  setErr("This browser doesn't support Web Crypto. Try a modern browser.");
}
